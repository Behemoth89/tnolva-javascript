services:
  web:
    build:
      context: .
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-https://tnolva-express-api.proxy.itcollege.ee/api}
        VITE_API_VERSION: ${VITE_API_VERSION:-v1}
    restart: unless-stopped
    container_name: ${PROJECT_NAME:-vue-todo-express}
    ports:
      - '${PORT:-87}:80'