version: '3.8'
services:
  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        - VITE_API_BASE_URL=https://nutikas.akaver.com
    ports:
      - "89:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s