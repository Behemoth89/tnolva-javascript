version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: nest-backend-postgres
    environment:
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change-me-in-production}
      POSTGRES_DB: ${DB_DATABASE:-nest_backend}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nest-backend-app
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${PORT:-3000}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}
      DB_HOST: postgres
      DB_PORT: ${DB_PORT:-5432}
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-change-me-in-production}
      DB_DATABASE: ${DB_DATABASE:-nest_backend}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-1d}
      SWAGGER_TITLE: ${SWAGGER_TITLE:-NestJS SaaS Backend API}
      SWAGGER_VERSION: ${SWAGGER_VERSION:-1.0}
      SWAGGER_DESCRIPTION: ${SWAGGER_DESCRIPTION:-SaaS Platform Backend API Documentation}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    # Use different command based on environment
    command: >
      sh -c "node dist/main"

volumes:
  postgres_data:
