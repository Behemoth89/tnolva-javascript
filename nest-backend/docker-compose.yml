version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: nest-backend-postgres
    environment:
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change-me-in-production}
      POSTGRES_DB: ${DB_DATABASE:-nest_backend}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Development service with hot reload
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: nest-backend-app-dev
    environment:
      NODE_ENV: development
      PORT: ${PORT:-3000}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}
      DB_HOST: postgres
      DB_PORT: ${DB_PORT:-5432}
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-change-me-in-production}
      DB_DATABASE: ${DB_DATABASE:-nest_backend}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-1d}
      SWAGGER_TITLE: ${SWAGGER_TITLE:-NestJS SaaS Backend API}
      SWAGGER_VERSION: ${SWAGGER_VERSION:-1.0}
      SWAGGER_DESCRIPTION: ${SWAGGER_DESCRIPTION:-SaaS Platform Backend API Documentation}
    ports:
      - "3000:3000"
      - "3001:3001"  # Debug port
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      # Mount source code for hot reload
      - .:/app
      # Mount node_modules to avoid reinstalling on every change
      - /app/node_modules
    # Use ts-node for hot reload with watch
    command: npx ts-node-dev --respawn --transpile-only -r tsconfig-paths/register src/main.ts

  # Production service
  app-prod:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: nest-backend-app-prod
    environment:
      NODE_ENV: production
      PORT: ${PORT:-3000}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}
      DB_HOST: postgres
      DB_PORT: ${DB_PORT:-5432}
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-change-me-in-production}
      DB_DATABASE: ${DB_DATABASE:-nest_backend}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-1d}
      SWAGGER_TITLE: ${SWAGGER_TITLE:-NestJS SaaS Backend API}
      SWAGGER_VERSION: ${SWAGGER_VERSION:-1.0}
      SWAGGER_DESCRIPTION: ${SWAGGER_DESCRIPTION:-SaaS Platform Backend API Documentation}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    command: node dist/main

volumes:
  postgres_data:
